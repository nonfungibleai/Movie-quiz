<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 최신 영화 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131c;--card:#1c1c2e;--accent:#ff3c5f;--accent2:#ffcc00;--accent3:#00e5ff;--text:#f0f0f8;--muted:#7070a0;--correct:#00c97a;--wrong:#ff3c5f;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}
.container{max-width:860px;margin:0 auto;padding:0 20px 80px;}
.header{text-align:center;padding:44px 0 36px;}
.header .strip{font-size:1.8rem;letter-spacing:6px;margin-bottom:14px;}
.header h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(2.2rem,7vw,3.6rem);background:linear-gradient(135deg,#ffcc00,#ff3c5f,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:8px;}
.header p{color:var(--muted);font-size:.9rem;letter-spacing:2px;text-transform:uppercase;}
.sec-label{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:var(--accent3);letter-spacing:3px;text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:28px;}
.movie-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .2s ease;position:relative;user-select:none;}
.movie-card:hover{border-color:rgba(255,204,0,.4);transform:translateY(-2px);}
.movie-card.selected{border-color:var(--accent2);background:rgba(255,204,0,.07);box-shadow:0 0 18px rgba(255,204,0,.15);}
.movie-card .chk{position:absolute;top:10px;right:10px;width:22px;height:22px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#000;opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.movie-card.selected .chk{opacity:1;transform:scale(1);}
.m-emoji{font-size:1.8rem;margin-bottom:8px;}
.m-title{font-family:'Black Han Sans',sans-serif;font-size:.95rem;color:var(--text);margin-bottom:3px;}
.m-year{font-size:.72rem;color:var(--muted);}
.m-genre{display:inline-block;margin-top:7px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.05);font-size:.68rem;color:var(--muted);}
.bottom-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 22px;margin-top:8px;}
.sel-info{color:var(--muted);font-size:.9rem;}
.sel-info b{color:var(--accent2);font-size:1.15rem;font-family:'Black Han Sans',sans-serif;}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;}
.btn{font-family:'Black Han Sans',sans-serif;font-size:.95rem;padding:12px 24px;border:none;border-radius:50px;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#ff3c5f,#ff6b35);color:#fff;box-shadow:0 4px 18px rgba(255,60,95,.3);}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,60,95,.45);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.3);}
.quiz-top{display:flex;align-items:center;justify-content:space-between;padding:22px 0 16px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.movie-badge{display:flex;align-items:center;gap:10px;}
.badge-emoji{font-size:1.4rem;}
.badge-title{font-family:'Black Han Sans',sans-serif;font-size:1rem;color:var(--accent2);}
.q-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.q-prog-text{font-size:.78rem;color:var(--muted);}
.prog-bar{width:150px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}
.score-txt{font-size:.78rem;color:var(--muted);}
.score-txt span{color:var(--correct);font-family:'Black Han Sans',sans-serif;font-size:1rem;}
.q-cat{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:.73rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
.cat-c{background:rgba(255,204,0,.14);color:var(--accent2);border:1px solid rgba(255,204,0,.3);}
.cat-p{background:rgba(0,229,255,.1);color:var(--accent3);border:1px solid rgba(0,229,255,.25);}
.cat-q{background:rgba(255,60,95,.1);color:var(--accent);border:1px solid rgba(255,60,95,.25);}
.cat-s{background:rgba(160,110,255,.1);color:#b08bff;border:1px solid rgba(160,110,255,.25);}
.q-text{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.2rem,3.5vw,1.65rem);line-height:1.45;margin-bottom:26px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
@media(max-width:480px){.opts-grid{grid-template-columns:1fr;}}
.opt-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;font-family:'Noto Sans KR',sans-serif;font-size:.92rem;color:var(--text);transition:all .18s ease;line-height:1.4;}
.opt-btn:hover:not(:disabled){border-color:rgba(255,204,0,.4);background:rgba(255,204,0,.04);transform:translateX(4px);}
.opt-lbl{width:28px;height:28px;min-width:28px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:.82rem;transition:all .2s;}
.opt-btn.correct{border-color:var(--correct);background:rgba(0,201,122,.1);}
.opt-btn.correct .opt-lbl{background:var(--correct);color:#000;}
.opt-btn.wrong{border-color:var(--wrong);background:rgba(255,60,95,.08);}
.opt-btn.wrong .opt-lbl{background:var(--wrong);color:#fff;}
.opt-btn.dim{opacity:.38;}
.opt-btn:disabled{cursor:default;}
.feedback{background:var(--surface);border-left:3px solid var(--correct);border-radius:12px;padding:16px 18px;display:none;}
.feedback.show{display:block;}
.feedback.fail-fb{border-left-color:var(--wrong);}
.fb-result{font-family:'Black Han Sans',sans-serif;font-size:1.05rem;margin-bottom:6px;}
.fb-result.ok{color:var(--correct);}
.fb-result.fail{color:var(--wrong);}
.fb-desc{font-size:.86rem;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.fb-next{text-align:right;}
.result-hero{text-align:center;padding:48px 0 36px;}
.r-emoji{font-size:3.8rem;margin-bottom:14px;}
.r-grade{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.8rem,6vw,3rem);background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;}
.r-score-line{font-size:1rem;color:var(--muted);}
.r-score-line span{font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:var(--text);}
.movie-results{display:grid;gap:10px;margin:28px 0;}
.mr-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.mr-left{display:flex;align-items:center;gap:10px;}
.mr-em{font-size:1.3rem;}
.mr-ttl{font-family:'Black Han Sans',sans-serif;font-size:.95rem;}
.mr-right{display:flex;align-items:center;gap:10px;}
.mr-bar-wrap{width:90px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.mr-bar{height:100%;border-radius:3px;transition:width 1s ease;}
.mr-bar.hi{background:var(--correct);}
.mr-bar.md{background:var(--accent2);}
.mr-bar.lo{background:var(--wrong);}
.mr-num{font-family:'Black Han Sans',sans-serif;font-size:.88rem;min-width:38px;text-align:right;}
.result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="container">

  <!-- SCREEN 1 -->
  <div id="screen-select" class="screen active">
    <div class="header">
      <div class="strip">🎬 🎞️ 🎬 🎞️ 🎬</div>
      <h1>최신 영화 퀴즈</h1>
      <p>Movie Quiz Night · 친구들과 함께</p>
    </div>
    <div class="sec-label">🎥 영화 선택 (2020년 이후)</div>
    <div class="movie-grid" id="movie-grid"></div>
    <div class="bottom-bar">
      <div class="sel-info"><b id="sel-count">0</b>편 선택 · 편당 5문제</div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="selectAll()">전체선택</button>
        <button class="btn btn-ghost" onclick="clearAll()">초기화</button>
        <button class="btn btn-primary" id="start-btn" onclick="startQuiz()" disabled>퀴즈 시작 🎬</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 2 -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-top">
      <div class="movie-badge">
        <span class="badge-emoji" id="q-emoji"></span>
        <span class="badge-title" id="q-title"></span>
      </div>
      <div class="q-meta">
        <div class="q-prog-text" id="q-prog-text"></div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="score-txt">점수 <span id="q-score">0</span></div>
      </div>
    </div>
    <div id="q-cat" class="q-cat"></div>
    <div id="q-text" class="q-text"></div>
    <div id="opts-grid" class="opts-grid"></div>
    <div id="feedback" class="feedback">
      <div id="fb-result" class="fb-result"></div>
      <div id="fb-desc" class="fb-desc"></div>
      <div class="fb-next"><button class="btn btn-primary" id="next-btn" onclick="nextQ()">다음 문제 →</button></div>
    </div>
  </div>

  <!-- SCREEN 3 -->
  <div id="screen-result" class="screen">
    <div class="result-hero">
      <div class="r-emoji" id="r-emoji"></div>
      <div class="r-grade" id="r-grade"></div>
      <div class="r-score-line">총 <span id="r-score"></span>점 / <span id="r-total"></span>점</div>
    </div>
    <div class="sec-label">📊 영화별 결과</div>
    <div class="movie-results" id="movie-results"></div>
    <div class="result-btns">
      <button class="btn btn-ghost" onclick="replaySame()">같은 영화로 재도전</button>
      <button class="btn btn-primary" onclick="goSelect()">영화 다시 선택 🎬</button>
    </div>
  </div>

</div>
<script>
var MOVIES = [
  // ── 왕과 사는 남자 ──
  {id:'kingsw',title:'왕과 사는 남자',year:'2026',emoji:'👑',genre:'사극/드라마',questions:[
    {cat:'c',catLabel:'👤 등장인물',q:'단종(이홍위)의 유배지를 자처한 마을 촌장의 이름은?',opts:['엄흥도','한명회','이문기','김성철'],ans:0,desc:'촌장 엄흥도(유해진)는 마을 부흥을 꿈꾸며 유배지를 자청했다가 어린 단종과 깊은 유대를 맺게 됩니다.'},
    {cat:'p',catLabel:'📍 장소',q:'단종이 유배된 강원도의 실제 유배지는?',opts:['금강산','청령포','오대산','설악산'],ans:1,desc:'청령포는 삼면이 물로 둘러싸인 강원도 영월의 땅으로, 단종의 유배지로 유명합니다.'},
    {cat:'s',catLabel:'📖 줄거리',q:'어린 왕 이홍위가 왕위에서 쫓겨나게 된 사건의 이름은?',opts:['임진왜란','계유정난','정유재란','병자호란'],ans:1,desc:'1453년 계유정난으로 수양대군(세조)이 조카 단종을 몰아내고 왕위를 찬탈했습니다.'},
    {cat:'c',catLabel:'👤 등장인물',q:'어린 단종 이홍위 역을 맡아 큰 화제를 모은 배우는?',opts:['안효섭','박지훈','이준혁','유지태'],ans:1,desc:'박지훈이 삶의 의지를 잃은 어린 단종을 섬세하게 연기해 관객들의 눈물을 자아냈습니다.'},
    {cat:'q',catLabel:'💬 명대사',q:'"___을/를 지키기 위해 내가 여기 있습니다." 엄흥도가 단종에게 한 대사, 빈칸은?',opts:['나라','마을','전하','백성'],ans:2,desc:'엄흥도가 단종 곁을 끝까지 지키겠다고 다짐하는 장면의 대사입니다.'}
  ]},
  // ── 파묘 ──
  {id:'exhuma',title:'파묘',year:'2024',emoji:'⚰️',genre:'공포/오컬트',questions:[
    {cat:'c',catLabel:'👤 등장인물',q:'무당 화림과 함께 활동하는 젊은 남성 무당은?',opts:['봉길','상덕','일출','영근'],ans:0,desc:'봉길(이도현)은 화림과 한 팀으로 움직이는 젊은 무당입니다.'},
    {cat:'p',catLabel:'📍 장소',q:'문제의 묘가 처음 발견된 장소는?',opts:['경기도 어느 산','전라남도 어느 마을','충청도 야산','강원도 깊은 산속'],ans:0,desc:'경기도의 한 부잣집 뒷산에 묻혀있는 묘가 사건의 발단이 됩니다.'},
    {cat:'s',catLabel:'📖 줄거리',q:'묘를 파낸 뒤 등장하는 거대한 존재의 정체는?',opts:['일제강점기 일본 음양사의 악귀','조선시대 억울한 왕족','고려시대 전쟁 영웅','민간 전설 속 구미호'],ans:0,desc:'묘 아래에는 일제강점기 조선의 기운을 억누르기 위한 일본 음양사의 봉인된 존재가 있었습니다.'},
    {cat:'q',catLabel:'💬 명대사',q:'"나쁜 것이 들어오지 못하도록 ___을/를 지켜라." 빈칸은?',opts:['문','터','몸','마음'],ans:1,desc:'터를 지켜라 — 묘를 파는 행위가 어떤 결과를 초래하는지 암시하는 대사입니다.'},
    {cat:'c',catLabel:'👤 등장인물',q:'베테랑 풍수사 역할을 연기한 배우는?',opts:['최민식','유해진','김고은','이도현'],ans:1,desc:'유해진이 베테랑 풍수사이자 묘를 파는 캐릭터를 맡았습니다.'}
  ]},
  // ── 밀수 ──
  {id:'smugglers',title:'밀수',year:'2023',emoji:'🌊',genre:'액션/범죄',questions:[
    {cat:'p',catLabel:'📍 장소',q:'영화의 주요 배경은?',opts:['1970년대 부산항','1980년대 인천 어촌','1970년대 경남 바닷가 마을','1960년대 제주도'],ans:2,desc:'1970년대 경상남도 작은 어촌 마을을 배경으로 해녀들의 삶과 밀수 세계가 교차합니다.'},
    {cat:'c',catLabel:'👤 등장인물',q:'춘자와 함께 주인공을 이루는 해녀의 이름은?',opts:['진숙','영희','말순','복순'],ans:0,desc:'진숙(김혜수)과 춘자(염정아)는 오랜 친구이자 경쟁자입니다.'},
    {cat:'s',catLabel:'📖 줄거리',q:'해녀들이 바다에서 몰래 건져 올리는 밀수품은?',opts:['마약','금괴','외제 물건 보따리','고급 화장품'],ans:2,desc:'당시 수입 금지된 외제 생활용품을 바다에서 건져 올리는 것이 밀수의 핵심입니다.'},
    {cat:'c',catLabel:'👤 등장인물',q:'밀수 조직의 보스 이름은?',opts:['권상사','도삼','박창인','이중식'],ans:1,desc:'도삼(조인성)은 해녀들을 이용해 밀수 사업을 벌이는 카리스마 있는 악역입니다.'},
    {cat:'q',catLabel:'💬 명대사',q:'"우리가 이 바다에서 먹고사는 한 ___는 우리 편이야." 빈칸은?',opts:['파도','바다','물고기','하늘'],ans:1,desc:'해녀들이 바다를 삶의 터전으로 여기는 마음이 담긴 대사입니다.'}
  ]},
  // ── 콘크리트 유토피아 ──
  {id:'concrete',title:'콘크리트 유토피아',year:'2023',emoji:'🏢',genre:'재난/드라마',questions:[
    {cat:'p',catLabel:'📍 장소',q:'대지진 이후 유일하게 살아남은 아파트 이름은?',opts:['황궁 아파트','영탑 아파트','하늘 아파트','태양 아파트'],ans:0,desc:'황궁 아파트만이 살아남아 생존자들의 갈등과 계급 문제가 펼쳐집니다.'},
    {cat:'c',catLabel:'👤 등장인물',q:'주민 대표로 선출되어 독단적 지도력을 보이는 인물은?',opts:['영탁','민성','명화','혜원'],ans:0,desc:'영탁(이병헌)은 카리스마 있는 주민 대표로 선출되지만 점점 폭압적으로 변합니다.'},

var selected=[],queue=[],cur=0,score=0,mScores={},answered=false;

function showScreen(id){
  var s=document.querySelectorAll('.screen');
  for(var i=0;i<s.length;i++)s[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

(function(){
  var g=document.getElementById('movie-grid');
  for(var i=0;i<MOVIES.length;i++){
    var m=MOVIES[i],d=document.createElement('div');
    d.className='movie-card';d.id='card-'+m.id;
    d.innerHTML='<div class="chk">✓</div><div class="m-emoji">'+m.emoji+'</div><div class="m-title">'+m.title+'</div><div class="m-year">'+m.year+'</div><div class="m-genre">'+m.genre+'</div>';
    (function(id){d.addEventListener('click',function(){toggleMovie(id);});})(m.id);
    g.appendChild(d);
  }
})();

function toggleMovie(id){
  var idx=selected.indexOf(id),card=document.getElementById('card-'+id);
  if(idx===-1){selected.push(id);card.classList.add('selected');}
  else{selected.splice(idx,1);card.classList.remove('selected');}
  document.getElementById('sel-count').textContent=selected.length;
  document.getElementById('start-btn').disabled=selected.length===0;
}
function selectAll(){
  for(var i=0;i<MOVIES.length;i++){
    var m=MOVIES[i];
    if(selected.indexOf(m.id)===-1){selected.push(m.id);document.getElementById('card-'+m.id).classList.add('selected');}
  }
  document.getElementById('sel-count').textContent=selected.length;
  document.getElementById('start-btn').disabled=false;
}
function clearAll(){
  selected=[];
  for(var i=0;i<MOVIES.length;i++)document.getElementById('card-'+MOVIES[i].id).classList.remove('selected');
  document.getElementById('sel-count').textContent=0;
  document.getElementById('start-btn').disabled=true;
}
function buildQueue(){
  queue=[];mScores={};
  for(var i=0;i<selected.length;i++){
    var mid=selected[i],movie=null;
    for(var j=0;j<MOVIES.length;j++){if(MOVIES[j].id===mid){movie=MOVIES[j];break;}}
    if(!movie)continue;
    mScores[mid]={correct:0,total:movie.questions.length,title:movie.title,emoji:movie.emoji};
    for(var k=0;k<movie.questions.length;k++)queue.push({mid:mid,qi:k});
  }
  for(var x=queue.length-1;x>0;x--){var y=Math.floor(Math.random()*(x+1)),t=queue[x];queue[x]=queue[y];queue[y]=t;}
}
function startQuiz(){
  if(selected.length===0)return;
  buildQueue();cur=0;score=0;answered=false;
  showScreen('screen-quiz');renderQ();
}
function getMovie(id){for(var i=0;i<MOVIES.length;i++)if(MOVIES[i].id===id)return MOVIES[i];return null;}
function renderQ(){
  answered=false;
  var item=queue[cur],movie=getMovie(item.mid),q=movie.questions[item.qi];
  document.getElementById('q-emoji').textContent=movie.emoji;
  document.getElementById('q-title').textContent=movie.title;
  document.getElementById('q-prog-text').textContent=(cur+1)+' / '+queue.length;
  document.getElementById('prog-fill').style.width=(cur/queue.length*100)+'%';
  document.getElementById('q-score').textContent=score;
  var catMap={c:'cat-c',p:'cat-p',q:'cat-q',s:'cat-s'},catEl=document.getElementById('q-cat');
  catEl.textContent=q.catLabel;catEl.className='q-cat '+(catMap[q.cat]||'cat-s');
  document.getElementById('q-text').textContent=q.q;
  var grid=document.getElementById('opts-grid');grid.innerHTML='';
  var labels=['A','B','C','D'];
  for(var i=0;i<q.opts.length;i++){
    var btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML='<span class="opt-lbl">'+labels[i]+'</span><span>'+q.opts[i]+'</span>';
    (function(idx,ans,desc){btn.addEventListener('click',function(){pick(idx,ans,desc);});})(i,q.ans,q.desc);
    grid.appendChild(btn);
  }
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').textContent=(cur===queue.length-1)?'결과 보기 🏆':'다음 문제 →';
}
function pick(sel,ans,desc){
  if(answered)return;answered=true;
  var btns=document.querySelectorAll('.opt-btn');
  for(var i=0;i<btns.length;i++){
    btns[i].disabled=true;
    if(i===ans)btns[i].classList.add('correct');
    else if(i===sel)btns[i].classList.add('wrong');
    else btns[i].classList.add('dim');
  }
  var ok=sel===ans;
  if(ok){score+=10;mScores[queue[cur].mid].correct++;}
  document.getElementById('q-score').textContent=score;
  var fb=document.getElementById('feedback'),fbRes=document.getElementById('fb-result');
  document.getElementById('fb-desc').textContent=desc;
  if(ok){fbRes.textContent='✅ 정답! +10점';fbRes.className='fb-result ok';fb.className='feedback show';}
  else{fbRes.textContent='❌ 오답! 정답은 '+['A','B','C','D'][ans]+'번';fbRes.className='fb-result fail';fb.className='feedback show fail-fb';}
}
function nextQ(){
  if(!answered)return;cur++;
  if(cur>=queue.length)showResult();else renderQ();
}
function showResult(){
  showScreen('screen-result');
  var total=queue.length*10,pct=total>0?score/total:0;
  var emoji,grade;
  if(pct>=.9){emoji='🏆';grade='영화 박사!';}
  else if(pct>=.7){emoji='🎬';grade='영화 마니아';}
  else if(pct>=.5){emoji='🍿';grade='영화 관람객';}
  else if(pct>=.3){emoji='😅';grade='예습이 필요해요';}
  else{emoji='😴';grade='영화 다시 보고 오기';}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-grade').textContent=grade;
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-total').textContent=total;
  var container=document.getElementById('movie-results');container.innerHTML='';
  for(var i=0;i<selected.length;i++){
    var mid=selected[i],ms=mScores[mid];if(!ms)continue;
    var ratio=ms.correct/ms.total,cls=ratio>=.8?'hi':ratio>=.5?'md':'lo';
    var row=document.createElement('div');row.className='mr-row';
    row.innerHTML='<div class="mr-left"><div class="mr-em">'+ms.emoji+'</div><div class="mr-ttl">'+ms.title+'</div></div><div class="mr-right"><div class="mr-bar-wrap"><div class="mr-bar '+cls+'" id="bar-'+mid+'" style="width:0%"></div></div><div class="mr-num">'+ms.correct+'/'+ms.total+'</div></div>';
    container.appendChild(row);
  }
  setTimeout(function(){
    for(var i=0;i<selected.length;i++){
      var mid=selected[i],ms=mScores[mid];if(!ms)continue;
      var el=document.getElementById('bar-'+mid);
      if(el)el.style.width=Math.round(ms.correct/ms.total*100)+'%';
    }
  },150);
}
function replaySame(){buildQueue();cur=0;score=0;answered=false;showScreen('screen-quiz');renderQ();}
function goSelect(){showScreen('screen-select');}
</script>
</body>
</html>
